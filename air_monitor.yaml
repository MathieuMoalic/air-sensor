esphome:
  name: air-monitor

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  deassert_rts_dtr: true

api:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 14.0dB
  fast_connect: true
  manual_ip:
    static_ip: "192.168.1.50"
    gateway: "192.168.1.1"
    subnet: "255.255.255.0"

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 2

prometheus:

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 100kHz

uart:
  - id: pms_uart
    rx_pin: GPIO6
    tx_pin: GPIO7
    baud_rate: 9600

sensor:
  - platform: sht3xd
    temperature:
      name: "Room Temperature"
      id: room_temperature
    humidity:
      name: "Room Humidity"
      id: room_humidity
    address: 0x44
    update_interval: 30min

  - platform: pmsx003
    type: PMSX003
    uart_id: pms_uart
    pm_1_0:
      name: "PM1.0"
      id: pm_1_0
    pm_2_5:
      name: "PM2.5"
      id: pm_2_5
    pm_10_0:
      name: "PM10"
      id: pm_10_0
    update_interval: 30min
